<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}多智能体 DevOps 系统{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="/">
      <i class="fas fa-robot me-2"></i>DevOps 智能体系统
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
            <i class="fas fa-tachometer-alt me-1"></i>仪表板
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'scenarios' %}active{% endif %}" href="/scenarios">
            <i class="fas fa-play-circle me-1"></i>场景
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'logs' %}active{% endif %}" href="/logs">
            <i class="fas fa-list-alt me-1"></i>日志
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'history' %}active{% endif %}" href="/history">
            <i class="fas fa-history me-1"></i>历史
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="/settings">
            <i class="fas fa-cog me-1"></i>设置
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'software_dev' %}active{% endif %}" href="/software-dev">
            <i class="fas fa-laptop-code me-1"></i>软件开发
            <i class="fas fa-code me-1"></i>开发框架
          </a>
        </li>
      </ul>

      <!-- 系统状态指示器 -->
      <div class="ms-3 d-flex align-items-center">
        <span class="badge bg-success me-1" id="ws-status">
          <i class="fas fa-circle me-1" style="font-size:.6rem"></i>在线
        </span>
      </div>
    </div>
  </div>
</nav>

<!-- 主内容区 -->
<div class="main-content">
  {% block content %}{% endblock %}
</div>

<!-- 全局 Toast 通知 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="globalToast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Main JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
