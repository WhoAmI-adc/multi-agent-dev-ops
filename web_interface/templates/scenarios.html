{% extends "base.html" %}
{% block title %}场景运行 — DevOps 智能体系统{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <h4 class="fw-bold mb-4"><i class="fas fa-play-circle me-2 text-primary"></i>场景运行器</h4>

  <!-- 场景卡片列表 -->
  <div class="row g-3 mb-4" id="scenario-cards">
    <div class="col-12 text-center py-4 text-muted"><i class="fas fa-spinner fa-spin"></i> 加载场景...</div>
  </div>

  <!-- 执行进度面板（默认隐藏） -->
  <div id="execution-panel" class="card border-0 shadow-sm" style="display:none!important">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h6 class="mb-0"><i class="fas fa-cog fa-spin me-2"></i>正在执行: <span id="exec-scenario-name">-</span></h6>
      <button class="btn btn-sm btn-outline-light" onclick="closeExecutionPanel()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="card-body">
      <!-- 进度条 -->
      <div class="mb-3">
        <div class="d-flex justify-content-between small text-muted mb-1">
          <span id="exec-current-step">-</span>
          <span id="exec-progress-pct">0%</span>
        </div>
        <div class="progress" style="height:10px">
          <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
               id="exec-progress-bar" style="width:0%"></div>
        </div>
      </div>

      <!-- 智能体对话窗口 -->
      <div class="card bg-dark text-light" style="min-height:200px;max-height:350px;overflow-y:auto" id="agent-dialog">
        <div class="card-body p-2 font-monospace small" id="agent-dialog-body">
          <span class="text-muted">等待执行...</span>
        </div>
      </div>

      <!-- 执行结果 -->
      <div id="exec-result" class="mt-3" style="display:none">
        <div class="alert mb-0" id="exec-result-alert"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/scenarios.js') }}"></script>
{% endblock %}
