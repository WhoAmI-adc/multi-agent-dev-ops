{% extends "base.html" %}
{% block title %}日志查看 — DevOps 智能体系统{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
    <h4 class="fw-bold mb-0"><i class="fas fa-list-alt me-2 text-primary"></i>实时日志</h4>
    <div class="d-flex gap-2 flex-wrap">
      <!-- 级别过滤 -->
      <div class="btn-group btn-group-sm" role="group">
        <button type="button" class="btn btn-outline-secondary active" data-level="ALL" onclick="filterLogs(this)">ALL</button>
        <button type="button" class="btn btn-outline-info"    data-level="INFO"    onclick="filterLogs(this)">INFO</button>
        <button type="button" class="btn btn-outline-warning" data-level="WARNING" onclick="filterLogs(this)">WARNING</button>
        <button type="button" class="btn btn-outline-danger"  data-level="ERROR"   onclick="filterLogs(this)">ERROR</button>
      </div>
      <!-- 搜索 -->
      <input type="text" class="form-control form-control-sm" id="log-search"
             placeholder="关键词搜索..." style="width:180px" oninput="applyLogFilters()" />
      <!-- 操作按钮 -->
      <button class="btn btn-sm btn-outline-success" onclick="exportLogs()">
        <i class="fas fa-download me-1"></i>导出
      </button>
      <button class="btn btn-sm btn-outline-danger" onclick="clearLogs()">
        <i class="fas fa-trash me-1"></i>清空
      </button>
      <!-- 自动滚动 -->
      <div class="form-check form-switch mb-0 d-flex align-items-center">
        <input class="form-check-input" type="checkbox" id="auto-scroll" checked>
        <label class="form-check-label ms-1 small" for="auto-scroll">自动滚动</label>
      </div>
    </div>
  </div>

  <!-- 日志终端 -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div id="log-terminal"
           style="background:#1a1a2e;color:#e0e0e0;font-family:monospace;font-size:.8rem;
                  height:520px;overflow-y:auto;padding:12px;border-radius:.375rem">
        <span class="text-muted">正在连接日志流...</span>
      </div>
    </div>
  </div>
  <div class="mt-2 small text-muted d-flex justify-content-between">
    <span>共显示 <strong id="log-count">0</strong> 条日志</span>
    <span>WebSocket: <span id="log-ws-status" class="text-success">已连接</span></span>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/logs.js') }}"></script>
{% endblock %}
